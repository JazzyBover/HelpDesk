<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raise-A-Ticket</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    
    <aside class="sidebar">
      <h2 class="logo">HelpDesk</h2>
      <nav>
        <a href="Dashboard.html">Dashboard</a>
        <a href="AllTickets.html">Tickets</a>
        <a href="CreateTicket.html">Raise a Ticket</a>
      </nav>
    </aside>

    <main class="main">
       <h1 class="page-title">Create Ticket</h1>
<p class="page-subtitle">Submit a new support request</p>

<div class="card form-card">
  <form>
    <div class="form-group">
      <label>Ticket Title</label><input type="text" placeholder="Ticket Title"><br><br>
      <label>Category</label>
      <select>
        <option>Technical Issue</option>
        <option>Billing</option>
        <option>Account</option>
      </select><br><br>
      <label>Priority</label>
      <select>
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
      </select><br><br>
      <label>Description</label>
      <textarea rows="4" placeholder="write here..."></textarea>
    </div>
    <button type="submit" class="btn">Submit</button>
  </form>
</div>
    </main>

  </div>
</body>
</html>
