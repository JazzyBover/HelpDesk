<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create-A-Ticket</title>
</head>
<body>
  <h1>create ticket</h1>
  <div class="container">
    <form>
      <label>Ticket Title : <input type="text" name="ticketname"></label>
      <label>Category : 
        <select>
          <option>Technical Issue</option>
          <option>Billing</option>
          <option>Account</option>
          <option>General Inquiry</option>
        </select></label>
      <label>Priority : 
        <select>
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
        </select></label>
      <label>File : <input type="file" name=""></label>
      <label>Description : <textarea></textarea></label>
      <button type="submit">SUBMIT</button>
    </form>
  </div>
</body>
</html>
