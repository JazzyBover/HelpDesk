<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    
    <aside class="sidebar">
      <h2 class="logo">HelpDesk</h2>
      <nav>
        <a href="Dashboard.html">Dashboard</a>
        <a href="AllTickets.html">Tickets</a>
        <a href="CreateTicket.html">Raise a Ticket</a>
      </nav>
    </aside>

    <main class="main">
      <!-- page specific content here -->
       <h1 class="page-title">Hello</h1>
<p class="page-subtitle">Here’s what’s happening with your tickets</p>

<div class="dashboard-cards">
  <div class="card">
    <div class="stat-number">20</div>
    <div class="stat-label">Open</div>
  </div>
  <div class="card">
    <div class="stat-number">12</div>
    <div class="stat-label">In Progress</div>
  </div>
  <div class="card">
    <div class="stat-number">8</div>
    <div class="stat-label">Resolved</div>
  </div>
  <div class="card">
    <div class="stat-number">40</div>
    <div class="stat-label">Total</div>
  </div>
</div>
<form class="filter-bar card">
  <select>
    <option>Status</option>
    <option>Open</option>
    <option>In Progress</option>
    <option>Resolved</option>
  </select>
  <select>
    <option>Priority</option>
    <option>Low</option>
    <option>Medium</option>
    <option>High</option>
  </select>
  <input type="datetime-local">
  <button type="reset" class="btn">Reset</button>
</form>

<div class="ticket-row card">
  <div>
    <div class="ticket-title">Login not working</div>
    <div class="ticket-meta">Created: 12 Dec 2025</div>
  </div>
  <div class="badge high">High</div>
</div>
<div class="ticket-row card">
  <div>
    <div class="ticket-title">Payment failed</div>
    <div class="ticket-meta">Created: 30 Jan 2026</div>
  </div>
  <div class="badge medium">Medium</div>
</div>
<div class="ticket-row card">
  <div>
    <div class="ticket-title">Password reset issue</div>
    <div class="ticket-meta">Created: 19 Feb 2026</div>
  </div>
  <div class="badge low">Low</div>
</div>
</div>
    </main>
  </div>
</body>
</html>
